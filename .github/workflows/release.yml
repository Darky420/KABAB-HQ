name: 'publish'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install dependencies
        run: npm install

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          if [ -z "$PREV_TAG" ]; then
            git log -5 --pretty=format:"- %s" >> $GITHUB_OUTPUT
          else
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: build app
        uses: tauri-apps/tauri-action@v0
        # noinspection ALL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || '' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || '' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || '' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || '' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || '' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}
        with:
          tagName: v__VERSION__
          releaseName: 'KABAB HQ v__VERSION__'
          releaseBody: |
            ## 🔥 KABAB HQ v__VERSION__

            ### What's New
            ${{ steps.changelog.outputs.CHANGES }}

            ### Installation
            1. Download the `.exe` setup file from the assets below
            2. Run the setup file
            3. Launch KABAB HQ from your Start Menu

            ### Auto-Update
            Already have KABAB HQ installed? The app will notify you about this update automatically!

            ---
            _Built with 🔥 by Kabab Gang_
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
