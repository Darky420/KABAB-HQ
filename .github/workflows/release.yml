name: 'publish'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install dependencies
        run: npm install

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          VITE_DISCORD_CLIENT_ID: ${{ secrets.VITE_DISCORD_CLIENT_ID }}
        with:
          tagName: v__VERSION__
          releaseName: 'KABAB HQ v__VERSION__'
          releaseBody: |
            ## 🔥 KABAB HQ v__VERSION__

            ### What's New
            Check the in-app changelog for full details.

            ### Installation
            1. Download the `.msi` installer from the assets below
            2. Run the installer
            3. Launch KABAB HQ from your Start Menu

            ### Auto-Update
            Already have KABAB HQ installed? The app will notify you about this update automatically!

            ---
            _Built with 🔥 by Kabab Gang_
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
